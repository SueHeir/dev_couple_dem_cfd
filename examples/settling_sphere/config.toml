# Single 30 µm glass sphere settling in air — the unresolved (point-particle)
# DEM-CFD seam, validated against the Stokes (1851) terminal velocity.
#
#   cargo run --release --example settling_sphere -- \
#       examples/settling_sphere/config.toml
#
# Parameters put the settling Reynolds number at Re ~ 0.14 (deep in the Stokes
# regime), so the closed form v_t = (2/9)(rho_p - rho_f) g R^2 / mu applies. The
# Schiller-Naumann correction (1 + 0.15 Re^0.687) lowers the true terminal
# velocity ~4% below the pure-Stokes value at this Re; the 6% tolerance is set
# from that known correction plus the sink-induced gas drift (<2%), NOT tuned.

[gas]
rho = 1.2          # kg/m^3 (air)
p = 1.0e5          # Pa
mu = 1.8e-5        # Pa.s (air)

[particle]
radius = 1.5e-5    # m  (30 µm diameter glass sphere)
density = 2500.0   # kg/m^3
x0 = 0.005         # release point (domain centre in x,y; high in z)
y0 = 0.005
z0 = 0.018

[gravity]
gz = -9.81         # m/s^2

# Gas mesh: a small quiescent box. FIELD owns these cells; the sub-cell particle
# is immersed and never owns one. 2 mm cells keep the per-cell gas mass >> the
# momentum the sink injects, so the sampled gas stays ~quiescent (reported).
[grid]
nx = 5
ny = 5
nz = 10
ng = 2
bounds_lo = [0.0, 0.0, 0.0]
bounds_hi = [0.01, 0.01, 0.02]

[run]
dt = 1.0e-4        # s  (<< relaxation time tau ~ 6.9e-3 s)
steps = 800        # 0.08 s ~ 11 tau: well past the terminal plateau
print_every = 100
average_frac = 0.2 # average v_z over the last 20% (on the plateau)

[validation]
tol_rel_stokes = 0.06     # |v_t - v_stokes|/v_stokes  (SN correction + gas drift)
tol_force_balance = 0.03  # |F_fluid - m g|/(m g) at steady state
re_max = 1.0              # regime gate: stay in the Stokes range
tol_momentum = 1.0e-6     # two-way momentum-exchange conservation
