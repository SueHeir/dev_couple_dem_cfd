# Fixed-bed pressure drop vs the Ergun (1952) correlation — unresolved DEM-CFD
# seam, looser bed porosity ε = 0.50.
#
# The COMPANION case to fixed_bed_ergun_eps40.toml: same beads, same gas, same
# velocity sweep, but a looser packing (solid_fraction 0.50 -> eps 0.50). Matching
# the Ergun reference at BOTH porosities is what pins the ε^3 porosity scaling of
# the assembled pressure drop — a wrong ε-power would pass one case and fail the
# other (the negative control in the harness injects exactly such a bug and shows
# it fails). MEASURED = independent MacDonald (1979) closure through the seam;
# REFERENCE = Ergun (1952). Cf. fixed_bed_ergun_eps40.toml for the full rationale.
#
#   cargo run --release --example fixed_bed_ergun -- \
#       examples/fixed_bed_ergun/config_eps50.toml

[gas]
rho = 1.2          # kg/m^3 (air)
p = 1.0e5          # Pa
mu = 1.8e-5        # Pa.s (air)

[particle]
diameter = 2.0e-3  # m  (2 mm beads)
density = 2500.0   # kg/m^3

[packing]
ncx = 12
ncy = 12
ncz = 24
solid_fraction = 0.50   # -> eps = 0.50

[mesh]
nx = 3
ny = 3
nz = 6
ng = 2

[flow]
superficial = [0.005, 0.01, 0.05, 0.1, 0.5, 1.0, 2.0]   # m/s
dt = 1.0e-4        # s

[validation]
tol_rel_ergun = 0.25
eps_max = 0.8
rep_viscous_below = 5.0
rep_inertial_above = 100.0
tol_momentum = 1.0e-6
tol_deposit_cell = 0.05
