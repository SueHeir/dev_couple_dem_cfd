# Fixed-bed pressure drop vs the Ergun (1952) correlation — unresolved DEM-CFD
# seam, canonical bed porosity ε = 0.40.
#
#   cargo run --release --example fixed_bed_ergun -- \
#       examples/fixed_bed_ergun/config.toml
#
# A static FCC packing of 2 mm spheres fills a column; air moves up through it at a
# sweep of superficial velocities U. The MEASURED dP/L is assembled through the
# unresolved seam from an INDEPENDENT packed-bed closure — MacDonald et al. (1979),
# 180/1.8 — and compared to the Ergun (1952) reference (150/1.75). Because the two
# share no constant, the relative error is a genuine, non-zero, ~5-20% spread (the
# documented inter-correlation difference), NOT machine epsilon. The sweep spans
# Re_p ~ 1 (viscous / Blake-Kozeny) to Re_p ~ 440 (inertial / Burke-Plummer). A
# built-in negative control (corrupted eps-power seam) proves the gate can fail.
# References: Ergun 1952; MacDonald, El-Sayed, Mow, Dullien 1979.

[gas]
rho = 1.2          # kg/m^3 (air)
p = 1.0e5          # Pa
mu = 1.8e-5        # Pa.s (air)

[particle]
diameter = 2.0e-3  # m  (2 mm beads)
density = 2500.0   # kg/m^3 (drag is density-independent; kept for completeness)

# FCC packing: 12x12x24 conventional cells (4 spheres each) = 13824 spheres. The
# lattice constant is derived from solid_fraction so the bed porosity is exactly
# ε = 1 - solid_fraction = 0.40, with non-overlapping spheres (FCC max phi 0.74).
[packing]
ncx = 12
ncy = 12
ncz = 24
solid_fraction = 0.60   # -> eps = 0.40

# Gas mesh COARSER than the particles (the unresolved regime): 4x4x4 conventional
# cells per gas cell => ~256 sub-cell spheres per cell, d/dx ~ 0.16 << 1. This is
# what makes the deposited per-cell void fraction converge to the bed porosity so
# it can DRIVE the drag (not an analytic value). Must divide the packing evenly.
[mesh]
nx = 3
ny = 3
nz = 6
ng = 2

[flow]
superficial = [0.005, 0.01, 0.05, 0.1, 0.5, 1.0, 2.0]   # m/s
dt = 1.0e-4        # s  (momentum-sink integral / conservation check)

[validation]
tol_rel_ergun = 0.25       # brackets the documented MacDonald(180/1.8)-vs-Ergun(150/1.75) spread (~5-20%)
eps_max = 0.8              # dense (Ergun) regime requires eps <= 0.8
rep_viscous_below = 5.0    # sweep must reach DOWN to Re_p <= 5 (viscous end)
rep_inertial_above = 100.0 # ...and UP to Re_p >= 100 (inertial end): spans the crossover
tol_momentum = 1.0e-6      # two-way momentum-exchange conservation (sanity, not the validation)
tol_deposit_cell = 0.05    # worst |eps_cell(deposit) - eps_bed|/eps_bed; the field DRIVES the drag
