# Minimum fluidization velocity U_mf — DYNAMIC unresolved DEM-CFD seam.
#
#   cargo run --release --example fluidized_bed_umf -- \
#       examples/fluidized_bed_umf/config.toml
#
# A freely-moving FCC bed of 1 mm, 2500 kg/m^3 beads (glass/sand, Geldart B/D) is
# immersed in an upward air stream. Each bead is a soil::Atom integrated by
# soil_verlet under gravity + the fluid force handed across the seam; the whole
# coupled system is stepped and the bed's centre-of-mass acceleration a_z(U) is
# MEASURED from the integration. Below U_mf a_z<0 (bed stays packed on the
# distributor); above U_mf a_z>0 (bed lifts / fluidizes); the zero-crossing is
# incipient fluidization.
#
# MEASURED drag = INDEPENDENT MacDonald et al. (1979) 180/1.8 closure assembled
# through the seam (drag + the pressure-gradient / generalized-buoyancy force);
# REFERENCE = Wen & Yu (1966) U_mf (Ergun-based, 33.7/0.0408). The two share no
# constant, so the ~4.5% agreement is genuine, not a tautology, and well inside
# Wen & Yu's own ~34% reported scatter. Two negative controls RUN and must fail:
# (A) dropping the pressure-gradient force (a real CFD-DEM mistake) shifts U_mf by
# ~1/eps (~+80%); (B) the eps^2-instead-of-eps^3 reduction bug (~-53%).
#
# References: Wen & Yu 1966; Ergun 1952; MacDonald et al. 1979; Goniva et al. 2012.

[gas]
rho = 1.2          # kg/m^3 (air)
p = 1.0e5          # Pa
mu = 1.8e-5        # Pa.s (air)

[particle]
diameter = 1.0e-3  # m  (1 mm beads)
density = 2500.0   # kg/m^3 (glass/sand)

# FCC packing: 8x8x16 conventional cells (4 spheres each) = 4096 spheres. Lattice
# constant derived from solid_fraction so bed porosity is exactly eps = 0.40 (the
# canonical incipient-fluidization voidage for spheres), non-overlapping.
[packing]
ncx = 8
ncy = 8
ncz = 16
solid_fraction = 0.60   # -> eps = 0.40

# Gas mesh COARSER than the particles (unresolved regime): 4x4x4 conventional cells
# per gas cell => ~256 sub-cell spheres/cell, d/dx ~ 0.16 << 1. Must divide packing.
[mesh]
nx = 2
ny = 2
nz = 4
ng = 2

[gravity]
gz = -9.81         # m/s^2 (down)

[flow]
# Superficial velocities to sweep — must BRACKET U_mf (~0.51 m/s here): some below
# (a_z<0, packed), some above (a_z>0, fluidized). Spans Re ~ 20-47.
superficial = [0.30, 0.40, 0.45, 0.50, 0.55, 0.60, 0.70]
dt = 5.0e-5        # s (coupling / integration timestep)
settle_steps = 20  # coupled steps from rest to measure a_z(U) (t = 1 ms; motion negligible)

[validation]
tol_rel_umf = 0.15       # |U_mf_meas - U_mf_WenYu|/U_mf_WenYu; brackets the MacDonald-vs-Wen&Yu closure spread, << Wen&Yu's ~34% scatter
umf_err_floor = 0.01     # measured rel.err must be > this (independent closure => genuinely non-zero, not a tautology)
tol_handoff = 0.03       # |a_z_meas - a_z_force|/g per point: integrator delivers the seam force to the moving bed
eps_max = 0.5            # dense packed-bed (Ergun/MacDonald) regime requires eps <= 0.5
tol_momentum = 1.0e-6    # two-way momentum-exchange conservation (sanity)
tol_deposit_cell = 0.02  # worst |eps_cell(deposit) - eps_bed|/eps_bed; the field DRIVES the drag
