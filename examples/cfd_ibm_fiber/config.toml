# Resolved drag anisotropy of a BPM fiber (5 bonded beads, aspect ratio p = L/d = 5)
# vs the Tirado–García de la Torre slender-body rod friction, via the 3-D
# ghost-cell IBM. The immersed body is a chain of spheres bonded by DIRT's Bonded-
# Particle Model (dirt_bond::auto_bond_touching); it is immersed and drag-integrated
# by the SAME multi-sphere machinery the single-sphere sphere_drag_validation uses.
#
#   cargo run --release --example cfd_ibm_fiber -- \
#       examples/cfd_ibm_fiber/config.toml
#
# ── Why the ANISOTROPY RATIO at low Re ──
# Absolute low-Re IBM drag carries a first-order staircase grid bias, a finite-
# domain confinement bias, and a low-Mach compressibility offset. All three act
# almost identically on the two orientations of the SAME fiber on the SAME mesh, so
# the ratio r = F⊥/F∥ cancels them. Residual finite-Re drift does not fully cancel,
# so the validation gates the lowest configured Re and reports the higher-Re point
# as an inertial trend check:
#
#     r(Re_d=0.25) compared with Tirado–GdlT r_theory = 1.277  (p=5)
#
# A single sphere (isotropic) has r = 1 exactly by symmetry and is REJECTED by the
# gate: the pass is falsifiable. The 8% tolerance brackets first-order IBM grid
# anisotropy at d/dx=4 plus residual finite-Re/confinement effects; it is not
# fitted to the measured ratio.

[fiber]
n_spheres = 5           # touching beads → rod length L = 5 d, aspect ratio p = 5
diameter = 0.1
youngs_modulus = 1.0e9  # BPM bond E (Pa) — paper-standard beam theory (dirt_bond)
shear_modulus = 4.0e8   # BPM bond G (Pa)
markers = 240           # spherical-Fibonacci surface quadrature points per bead

[flow]
rho = 1.0
p = 1.0e5               # sound speed ~374 m/s
u_inf = 56.1            # M ~ 0.15 (incompressible / Stokes surrogate)
reynolds = [0.25, 0.5]  # lowest point is gated; higher point is an inertial trend check

[mesh]
cells_per_diameter = 4.0  # d/dx = 4 (review-runnable; ratio cancels most grid bias)
up = 2.0                  # upstream clearance from the fiber surface (diameters)
dn = 4.0                  # downstream clearance (wake + sponge)
lat = 2.0                 # lateral clearance (identical both orientations)
ng = 2

[solver]
cfl = 0.3
muscl = false

[sponge]
sigma = 2.0e4           # downstream freestream-absorber rate [1/s]

[run]
# End-on (axial) drag on a slender body relaxes slowly at low Re. This review case
# is sized to reach a repeatable plateau at d/dx=4; higher-resolution studies can
# use the same declarative knobs with larger steps/cells_per_diameter.
steps = 1600
print_every = 400
average_frac = 0.10     # average drag / test steadiness over the last 10%

[validation]
# Stage 1 — exact analytic-field coupling checks on the fiber clump (tight anchor).
tol_volume = 0.03         # recovered union volume vs Σ bead volumes (cut-cell quadrature)
tol_uniform_ratio = 1.0e-6 # |F_uniform|/|F_hydro|: net force in a uniform pressure → 0
tol_buoyancy = 0.03       # recovered buoyancy vs Archimedes ρ_f g V_union
gz = -9.81                # gravity for the analytic hydrostatic field only
# Stage 2 — real-flow drag anisotropy vs Tirado slender-body ratio.
tol_ratio = 0.08          # |r_lowest_Re − r_theory|/r_theory; brackets first-order
                          # IBM grid anisotropy + residual finite-Re/confinement.
                          # NOT tuned to the measured ratio.
steady_ptp_tol = 0.02     # max Cd peak-to-peak per run: anti-transient gate
aniso_margin = 0.15       # r_lowest_Re must exceed the isotropic null (r=1) by ≥ this
