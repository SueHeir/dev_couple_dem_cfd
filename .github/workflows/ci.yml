name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  routed-coupling:
    name: public build + 3x2 routed MPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OpenMPI
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenmpi-dev openmpi-bin
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Reject private and sibling-only dependencies
        run: |
          ! grep -R -E '192\.168\.|ssh://git@|path = "\.\./' --include='Cargo.toml' .
      - name: Test routed coupling
        env:
          OMPI_MCA_rmaps_base_oversubscribe: "1"
        run: timeout 180 cargo test -p dem_cfd --features mpi-routing -- --nocapture

